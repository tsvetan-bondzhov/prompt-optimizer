{% extends "base.html" %}
{% block title %}Run Optimization — Prompt Optimizer{% endblock %}
{% block content %}
<h1>Run an optimization loop</h1>
<p class="muted">Iteratively improves the prompt until the target score is reached or the iteration budget is exhausted.</p>

<form method="post" action="/optimize" class="stacked">
  <label>Prompt
    <select name="prompt_id" required>
      <option value="" disabled {% if not selected_prompt_id %}selected{% endif %}>— pick a prompt —</option>
      {% for s in prompts %}
      <option value="{{ s.id }}" {% if s.id == selected_prompt_id %}selected{% endif %}>
        {{ s.name }}{% if s.avg_score is not none %} (score {{ '%.2f'|format(s.avg_score) }}){% endif %}
      </option>
      {% endfor %}
    </select>
  </label>
  <div class="grid-3">
    <label>Target score
      <input type="number" name="target_score" min="1" max="10" step="0.1" value="{{ defaults.target_score }}">
    </label>
    <label>Max iterations
      <input type="number" name="max_iterations" min="1" value="{{ defaults.max_iterations }}">
    </label>
    <label>Executions per test case
      <input type="number" name="executions_per_test_case" min="1" value="{{ defaults.executions_per_test_case }}">
    </label>
  </div>
  <div class="actions">
    <button class="btn primary" type="submit">Start optimization</button>
  </div>
</form>
{% endblock %}
